<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Avaliações</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" type="text/css" href="../static/css/styles.css" th:href="@{/css/styles.css}"/>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"></script>

    <style>
        .tr-clicavel {
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .tr-clicavel:hover {
            background-color: #dcdcdc !important;
        }
    </style>
</head>
<body>
<div class="d-flex">

    <div class="sidebar-custom d-flex flex-column flex-shrink-0">

        <div class="sidebar-logo d-flex justify-content-center align-items-center py-3 mb-2 w-100">
            <img th:src="@{/images/acrillogo.svg}" src="../static/images/acrillogo.svg" alt="Logo AcrillService" class="img-fluid" style="max-height: 120px; max-width: 120px; object-fit: contain;">
        </div>

        <a th:href="@{/}" class="nav-link-custom text-uppercase">
            <i class="bi bi-house-door-fill"></i>
            <span>Início</span>
        </a>
        <a th:href="@{/produto}" class="nav-link-custom text-uppercase">
            <i class="bi bi-box-seam-fill"></i>
            <span>Produtos</span>
        </a>
        <a th:href="@{/venda}" class="nav-link-custom text-uppercase">
            <i class="bi bi-cart-fill"></i>
            <span>Vendas</span>
        </a>
        <a th:href="@{/orcamento}" class="nav-link-custom text-uppercase">
            <i class="bi bi-file-earmark-text-fill"></i>
            <span>Orçamentos</span>
        </a>
        <a th:href="@{/cliente}" class="nav-link-custom text-uppercase">
            <i class="bi bi-people-fill"></i>
            <span>Clientes</span>
        </a>
        <a th:href="@{/avaliacao}" class="nav-link-custom active text-uppercase">
            <i class="bi bi-star-fill"></i>
            <span>Avaliações</span>
        </a>
        <a th:href="@{/sobre}" class="nav-link-custom mt-auto text-uppercase no-hover">
            <i class="bi bi-info-circle-fill"></i>
            <span>Sobre</span>
        </a>
    </div>

    <div class="main-content flex-grow-1 p-5">

        <h1 class="page-title mb-2">AVALIAÇÕES</h1>

        <div class="d-flex align-items-center gap-3 mb-4 flex-wrap">
            <div class="search-container">
                <i class="bi bi-search"></i>
                <input type="text" class="search-input" placeholder="Procurar avaliação">
            </div>

            <button class="btn btn-orange text-uppercase" data-bs-toggle="modal" data-bs-target="#modalCriarAvaliacao">
                Nova Avaliação
            </button>

            <button class="btn btn-orange text-uppercase ms-auto" onclick="ordenarTabela()">Ordenar</button>
        </div>

        <div class="table-responsive">
            <table class="table table-custom table-hover">
                <thead>
                <tr>
                    <th>Código</th>
                    <th>Código Venda</th>
                    <th>Título</th>
                    <th>Data</th>
                    <th>Nota</th>
                    <th class="text-end">Ações</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="avaliacao : ${avaliacoes}"
                    class="tr-clicavel"
                    onclick="abrirModalDetalhes(this)"
                    th:attr="data-id=${avaliacao.id},
                             data-venda=${avaliacao.venda.id},
                             data-titulo=${avaliacao.titulo},
                             data-data=${#dates.format(avaliacao.dataCriacao, 'dd/MM/yyyy')},
                             data-descricao=${avaliacao.descricao},
                             data-nota=${avaliacao.nota}">

                    <td th:text="${avaliacao.id}"></td>
                    <td th:text="${avaliacao.venda.id}"></td>
                    <td th:text="${avaliacao.titulo}"></td>
                    <td th:text="${#dates.format(avaliacao.dataCriacao, 'dd/MM/yyyy')}"></td>
                    <td>
                        <span class="badge"
                              th:classappend="${avaliacao.nota <= 1 ? 'badge-vermelho' : (avaliacao.nota <= 3 ? 'badge-amarelo' : 'badge-verde')}"
                              th:text="${#numbers.formatDecimal(avaliacao.nota, 1, 0) + ' / 5'}"></span>
                    </td>
                    <td class="text-end">
                        <button class="btn btn-sm btn-outline-secondary me-2" title="Editar"
                                data-bs-toggle="modal" data-bs-target="#modalEditarAvaliacao"
                                th:attr="data-id=${avaliacao.id},
                                         data-venda=${avaliacao.venda.id},
                                         data-titulo=${avaliacao.titulo},
                                         data-descricao=${avaliacao.descricao},
                                         data-nota=${avaliacao.nota}">
                            <i class="bi bi-pencil-fill"></i>
                        </button>
                        <button class="btn btn-sm btn-outline-danger" title="Excluir">
                            <i class="bi bi-trash-fill"></i>
                        </button>
                    </td>
                </tr>
                </tbody>
            </table>

            <div th:if="${totalPaginas > 1}" class="d-flex justify-content-between align-items-center mt-4 px-2">
                <div class="text-muted fw-bold" style="font-size: 0.95rem;">
                    Exibindo página <span th:text="${paginaAtual}">1</span> de <span th:text="${totalPaginas}">5</span>
                    (Total de <span th:text="${totalItens}">75</span> avaliações)
                </div>

                <nav aria-label="Navegação de páginas">
                    <ul class="pagination mb-0">

                        <li class="page-item" th:classappend="${paginaAtual == 1} ? 'disabled'">
                            <a class="page-link" th:href="@{/avaliacao(page=${paginaAtual - 1})}" aria-label="Anterior" style="color: #000000; box-shadow: none;">
                                <span aria-hidden="true">&laquo;</span>
                            </a>
                        </li>

                        <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPaginas)}"
                            th:classappend="${paginaAtual == i} ? 'active'">
                            <a class="page-link fw-bold"
                               th:href="@{/avaliacao(page=${i})}"
                               th:text="${i}"
                               th:style="${paginaAtual == i} ? 'background-color: #ff7e12; border-color: #000000; color: #000000;' : 'color: #000000; box-shadow: none;'">
                                1
                            </a>
                        </li>

                        <li class="page-item" th:classappend="${paginaAtual == totalPaginas} ? 'disabled'">
                            <a class="page-link" th:href="@{/avaliacao(page=${paginaAtual + 1})}" aria-label="Próximo" style="color: #000000; box-shadow: none;">
                                <span aria-hidden="true">&raquo;</span>
                            </a>
                        </li>

                    </ul>
                </nav>
            </div>
        </div>

    </div>
</div>

<div class="modal fade" id="modalDetalhesAvaliacao" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content shadow-lg border-0" style="border-radius: 16px; padding: 6px; background-color: #ffffff;">
            <div style="border: 1.8px solid #14213d; border-radius: 12px; height: 100%;">
                <div class="modal-header border-0 pb-0">
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body px-5 pb-5 pt-2 text-center">
                    <h1 class="page-title text-uppercase mb-3" style="line-height: 1.1;">
                        Detalhes<br>Avaliação
                    </h1>
                    <hr class="mx-auto mb-5" style="width: 60%; border-top: 1px solid #000; opacity: 1;">

                    <div class="text-start px-md-4">
                        <div class="row g-4">
                            <div class="col-md-8">
                                <label class="form-label fw-bold text-uppercase text-dark mb-1" style="font-size: 1.1rem;">Título</label>
                                <input type="text" id="detalheAvaliacaoTitulo" class="form-control form-control-lg fw-bold" readonly
                                       style="border: 1.8px solid #ccc; border-radius: 8px; background-color: #f8f9fa;">
                            </div>

                            <div class="col-md-4">
                                <label class="form-label fw-bold text-uppercase text-dark mb-1" style="font-size: 1.1rem;">Nota</label>
                                <input type="text" id="detalheAvaliacaoNota" class="form-control form-control-lg fw-bold" readonly
                                       style="border: 1.8px solid #ccc; border-radius: 8px; background-color: #f8f9fa;">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-bold text-uppercase text-dark mb-1" style="font-size: 1.1rem;">Venda Relacionada</label>
                                <input type="text" id="detalheAvaliacaoVenda" class="form-control form-control-lg" readonly
                                       style="border: 1.8px solid #ccc; border-radius: 8px; background-color: #f8f9fa;">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-bold text-uppercase text-dark mb-1" style="font-size: 1.1rem;">Data</label>
                                <input type="text" id="detalheAvaliacaoData" class="form-control form-control-lg" readonly
                                       style="border: 1.8px solid #ccc; border-radius: 8px; background-color: #f8f9fa;">
                            </div>

                            <div class="col-md-12">
                                <label class="form-label fw-bold text-uppercase text-dark mb-1" style="font-size: 1.1rem;">Descrição</label>
                                <textarea id="detalheAvaliacaoDescricao" class="form-control form-control-lg" rows="3" readonly
                                          style="border: 1.8px solid #ccc; border-radius: 8px; background-color: #f8f9fa; resize: none;"></textarea>
                            </div>
                        </div>

                        <div class="d-flex justify-content-center mt-5">
                            <button type="button" class="btn btn-outline-secondary fw-bolder text-uppercase" data-bs-dismiss="modal"
                                    style="font-size: 1.2rem; padding: 12px 40px; border-radius: 8px; border-width: 1.8px;">
                                Fechar
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:fragment="modalCriar" class="modal fade" id="modalCriarAvaliacao" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content shadow-lg border-0" style="border-radius: 16px; padding: 6px; background-color: #ffffff;">
            <div style="border: 1.8px solid #14213d; border-radius: 12px; height: 100%;">
                <div class="modal-header border-0 pb-0">
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body px-5 pb-5 pt-2 text-center">
                    <h1 class="page-title text-uppercase mb-3" style="line-height: 1.1;">
                        Nova<br>Avaliação
                    </h1>
                    <hr class="mx-auto mb-5" style="width: 60%; border-top: 1px solid #000; opacity: 1;">

                    <form class="text-start px-md-4">
                        <div class="row g-4">
                            <div class="col-md-8">
                                <label class="form-label fw-bold text-uppercase text-dark mb-1" style="font-size: 1.1rem;">Título</label>
                                <input type="text" class="form-control form-control-lg"
                                       style="border: 1.8px solid #000; border-radius: 8px; box-shadow: none;">
                            </div>

                            <div class="col-md-4">
                                <label class="form-label fw-bold text-uppercase text-dark mb-1" style="font-size: 1.1rem;">Nota (0 a 5)</label>
                                <select class="form-select form-select-lg" style="border: 1.8px solid #000; border-radius: 8px; box-shadow: none;">
                                    <option selected disabled value="">Selecione</option>
                                    <option value="0">0</option>
                                    <option value="1">1</option>
                                    <option value="2">2</option>
                                    <option value="3">3</option>
                                    <option value="4">4</option>
                                    <option value="5">5</option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-bold text-uppercase text-dark mb-1" style="font-size: 1.1rem;">Venda Relacionada</label>
                                <select class="form-select form-select-lg" style="border: 1.8px solid #000; border-radius: 8px;">
                                    <option selected disabled value="">Selecione a Venda</option>
                                    <option th:each="venda : ${vendas}" th:value="${venda.id}" th:text="${'Venda #' + venda.id}"></option>
                                    <option value="101">Venda #101</option>
                                    <option value="105">Venda #105</option>
                                </select>
                            </div>

                            <div class="col-md-12">
                                <label class="form-label fw-bold text-uppercase text-dark mb-1" style="font-size: 1.1rem;">Descrição</label>
                                <textarea class="form-control form-control-lg" rows="3"
                                          style="border: 1.8px solid #000; border-radius: 8px; box-shadow: none; resize: none;"></textarea>
                            </div>
                        </div>

                        <div class="d-flex justify-content-center gap-3 mt-5">
                            <button type="button" class="btn btn-outline-secondary fw-bolder text-uppercase" data-bs-dismiss="modal"
                                    style="font-size: 1.2rem; padding: 12px 40px; border-radius: 8px; border-width: 1.8px;">
                                Cancelar
                            </button>
                            <button type="button" class="btn btn-orange fw-bolder text-uppercase text-white"
                                    style="font-size: 1.2rem; padding: 12px 40px; border-radius: 8px; background-color: #ff9433; border: none;">
                                Salvar
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:fragment="modalEditar" class="modal fade" id="modalEditarAvaliacao" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content shadow-lg border-0" style="border-radius: 16px; padding: 6px; background-color: #ffffff;">
            <div style="border: 1.8px solid #14213d; border-radius: 12px; height: 100%;">
                <div class="modal-header border-0 pb-0">
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body px-5 pb-5 pt-2 text-center">
                    <h1 class="page-title text-uppercase mb-3" style="line-height: 1.1;">
                        Editar<br>Avaliação
                    </h1>
                    <hr class="mx-auto mb-5" style="width: 60%; border-top: 1px solid #000; opacity: 1;">

                    <form class="text-start px-md-4">
                        <input type="hidden" id="editAvaliacaoId" name="Id">

                        <div class="row g-4">
                            <div class="col-md-8">
                                <label class="form-label fw-bold text-uppercase text-dark mb-1" style="font-size: 1.1rem;">Título</label>
                                <input type="text" id="editAvaliacaoTitulo" class="form-control form-control-lg"
                                       style="border: 1.8px solid #000; border-radius: 8px; box-shadow: none;">
                            </div>

                            <div class="col-md-4">
                                <label class="form-label fw-bold text-uppercase text-dark mb-1" style="font-size: 1.1rem;">Nota (0 a 5)</label>
                                <select id="editAvaliacaoNota" class="form-select form-select-lg" style="border: 1.8px solid #000; border-radius: 8px; box-shadow: none;">
                                    <option disabled value="">Selecione</option>
                                    <option value="0">0</option>
                                    <option value="1">1</option>
                                    <option value="2">2</option>
                                    <option value="3">3</option>
                                    <option value="4">4</option>
                                    <option value="5">5</option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-bold text-uppercase text-dark mb-1" style="font-size: 1.1rem;">Venda Relacionada</label>
                                <input type="text" id="editAvaliacaoVenda" class="form-control form-control-lg fw-bold" readonly
                                       style="border: 1.8px solid #000; border-radius: 8px; background-color: #e9e9e9;">
                            </div>

                            <div class="col-md-12">
                                <label class="form-label fw-bold text-uppercase text-dark mb-1" style="font-size: 1.1rem;">Descrição</label>
                                <textarea id="editAvaliacaoDescricao" class="form-control form-control-lg" rows="3"
                                          style="border: 1.8px solid #000; border-radius: 8px; box-shadow: none; resize: none;"></textarea>
                            </div>
                        </div>

                        <div class="d-flex justify-content-center gap-3 mt-5">
                            <button type="button" class="btn btn-outline-secondary fw-bolder text-uppercase" data-bs-dismiss="modal"
                                    style="font-size: 1.2rem; padding: 12px 40px; border-radius: 8px; border-width: 1.8px;">
                                Cancelar
                            </button>
                            <button type="button" class="btn btn-orange fw-bolder text-uppercase text-white"
                                    style="font-size: 1.2rem; padding: 12px 40px; border-radius: 8px; background-color: #ff9433; border: none;">
                                Salvar Alterações
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function abrirModalDetalhes(row) {
        const titulo = row.getAttribute('data-titulo');
        const venda = row.getAttribute('data-venda');
        const nota = row.getAttribute('data-nota');
        const data = row.getAttribute('data-data');
        const descricao = row.getAttribute('data-descricao');

        const notaFloat = parseFloat(nota);
        let notaStr = "";
        if(!isNaN(notaFloat)){
            notaStr = Math.round(notaFloat).toString() + " / 5";
        }

        document.getElementById('detalheAvaliacaoTitulo').value = titulo || '';
        document.getElementById('detalheAvaliacaoVenda').value = venda ? + venda : '';
        document.getElementById('detalheAvaliacaoNota').value = notaStr;
        document.getElementById('detalheAvaliacaoData').value = data || '';
        document.getElementById('detalheAvaliacaoDescricao').value = descricao || '';

        const modal = new bootstrap.Modal(document.getElementById('modalDetalhesAvaliacao'));
        modal.show();
    }

    document.addEventListener('DOMContentLoaded', function () {
        const modalEditar = document.getElementById('modalEditarAvaliacao');

        if (modalEditar) {
            modalEditar.addEventListener('show.bs.modal', function (event) {
                const button = event.relatedTarget;
                if(!button) return;

                const id = button.getAttribute('data-id');
                const idVenda = button.getAttribute('data-venda');
                const titulo = button.getAttribute('data-titulo');
                const descricao = button.getAttribute('data-descricao');

                const notaFloat = parseFloat(button.getAttribute('data-nota'));
                let notaInt = "";
                if(!isNaN(notaFloat)){
                    notaInt = Math.round(notaFloat).toString();
                }

                document.getElementById('editAvaliacaoId').value = id;
                document.getElementById('editAvaliacaoVenda').value = 'Venda #' + idVenda;
                document.getElementById('editAvaliacaoTitulo').value = titulo;
                document.getElementById('editAvaliacaoNota').value = notaInt;
                document.getElementById('editAvaliacaoDescricao').value = descricao;
            });
        }
    });

    document.querySelectorAll('.table-custom button').forEach(button => {
        button.addEventListener('click', function (e) {
            e.stopPropagation();
        });
    });

    let ordemCrescente = false;

    function ordenarTabela() {
        const tbody = document.querySelector('.table-custom tbody');
        const linhas = Array.from(tbody.querySelectorAll('tr'));

        linhas.sort((linhaA, linhaB) => {
            const idA = parseInt(linhaA.cells[0].innerText.trim());
            const idB = parseInt(linhaB.cells[0].innerText.trim());

            if (ordemCrescente) {
                return idA - idB;
            } else {
                return idB - idA;
            }
        });

        ordemCrescente = !ordemCrescente;

        tbody.innerHTML = '';
        linhas.forEach(linha => tbody.appendChild(linha));
    }
</script>

</body>
</html>
