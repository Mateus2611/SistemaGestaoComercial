<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Produtos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" type="text/css" href="../../static/css/styles.css" th:href="@{/css/styles.css}"/>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"></script>
</head>
<body>

<div class="d-flex">

    <div class="sidebar-custom d-flex flex-column flex-shrink-0">

        <a th:href="@{/}" class="nav-link-custom text-uppercase">
            <i class="bi bi-house-door-fill"></i>
            <span>Início</span>
        </a>

        <a th:href="@{produto}" class="nav-link-custom active text-uppercase">
            <i class="bi bi-box-seam-fill"></i>
            <span>Produtos</span>
        </a>

        <a th:href="@{venda}" class="nav-link-custom text-uppercase">
            <i class="bi bi-cart-fill"></i>
            <span>Vendas</span>
        </a>

        <a th:href="@{orcamento}" class="nav-link-custom text-uppercase">
            <i class="bi bi-file-earmark-text-fill"></i>
            <span>Orçamentos</span>
        </a>

        <a th:href="@{cliente}" class="nav-link-custom text-uppercase">
            <i class="bi bi-people-fill"></i>
            <span>Clientes</span>
        </a>

        <a th:href="@{avaliacao}" class="nav-link-custom text-uppercase">
            <i class="bi bi-star-fill"></i>
            <span>Avaliações</span>
        </a>

        <a th:href="@{sobre}" class="nav-link-custom mt-auto text-uppercase no-hover">
            <i class="bi bi-info-circle-fill"></i>
            <span>Sobre</span>
        </a>

    </div>

    <div class="main-content flex-grow-1 p-5">

        <h1 class="page-title mb-4">PRODUTOS</h1>

        <div class="d-flex align-items-center gap-3 mb-4 flex-wrap">
            <div class="search-container">
                <i class="bi bi-search"></i>
                <input type="text" class="search-input" placeholder="Procurar produto">
            </div>

            <button class="btn btn-orange text-uppercase" data-bs-toggle="modal" data-bs-target="#modalCriarProduto">
                Novo Produto
            </button>

            <button class="btn btn-orange text-uppercase ms-auto">Ordenar</button>
        </div>

        <div class="table-responsive">
            <table class="table table-custom">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome do Produto</th>
                    <th>Valor (R$)</th>
                    <th class="text-end">Ações</th>
                </tr>
                </thead>
                <tbody>

                <tr th:each="produto : ${produtos}">
                    <td th:text="${produto.id}">1</td>
                    <td th:text="${produto.nome}">Produto Exemplo</td>
                    <td th:text="${#numbers.formatDecimal(produto.valor, 1, 'POINT', 2, 'COMMA')}">99,90</td>
                    <td class="text-end">
                        <button class="btn btn-sm btn-outline-secondary me-2" title="Editar" data-bs-toggle="modal" data-bs-target="#modalEditarProduto">
                            <i class="bi bi-pencil-fill"></i>
                        </button>
                        <button class="btn btn-sm btn-outline-danger" title="Excluir">
                            <i class="bi bi-trash-fill"></i>
                        </button>
                    </td>
                </tr>

                <tr>
                    <td>2</td>
                    <td>Caixa de Ferramentas</td>
                    <td>150,00</td>
                    <td class="text-end">
                        <button class="btn btn-sm btn-outline-secondary me-2" title="Editar" data-bs-toggle="modal" data-bs-target="#modalEditarProduto">
                            <i class="bi bi-pencil-fill"></i>
                        </button>
                        <button class="btn btn-sm btn-outline-danger" title="Excluir">
                            <i class="bi bi-trash-fill"></i>
                        </button>
                    </td>
                </tr>
                <tr>
                    <td>3</td>
                    <td>Furadeira de Impacto</td>
                    <td>320,50</td>
                    <td class="text-end">
                        <button class="btn btn-sm btn-outline-secondary me-2" title="Editar" data-bs-toggle="modal" data-bs-target="#modalEditarProduto">
                            <i class="bi bi-pencil-fill"></i>
                        </button>
                        <button class="btn btn-sm btn-outline-danger" title="Excluir">
                            <i class="bi bi-trash-fill"></i>
                        </button>
                    </td>
                </tr>
                <tr>
                    <td>4</td>
                    <td>Parafusos (Pacote 100x)</td>
                    <td>15,90</td>
                    <td class="text-end">
                        <button class="btn btn-sm btn-outline-secondary me-2" title="Editar" data-bs-toggle="modal" data-bs-target="#modalEditarProduto">
                            <i class="bi bi-pencil-fill"></i>
                        </button>
                        <button class="btn btn-sm btn-outline-danger" title="Excluir">
                            <i class="bi bi-trash-fill"></i>
                        </button>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

    </div>
</div>

<div th:fragment="modalCriar" class="modal fade" id="modalCriarProduto" tabindex="-1" aria-hidden="true">

    <div class="modal-dialog modal-dialog-centered modal-lg">

        <div class="modal-content shadow-lg border-0" style="border-radius: 4px;">

            <div class="modal-header border-0 pb-0">
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <div class="modal-body px-5 pb-5 pt-2 text-center">

                <h1 class="page-title text-uppercase mb-3" style="line-height: 1;">
                    Criar<br>Produto
                </h1>

                <hr class="mx-auto mb-5" style="width: 80%; border-top: 1px solid #000; opacity: 1;">

                <form class="text-start px-md-4">
                    <div class="row g-4">

                        <div class="col-md-7">
                            <label class="form-label fw-bold text-uppercase text-dark mb-1" style="font-size: 1.1rem;">Nome do Produto :</label>
                            <input type="text" class="form-control form-control-lg"
                                   style="border: 2px solid #000; border-radius: 0; box-shadow: none;">
                        </div>

                        <div class="col-md-5">
                            <label class="form-label fw-bold text-uppercase text-dark mb-1" style="font-size: 1.1rem;">Valor (R$):</label>
                            <input type="number" step="0.01" class="form-control form-control-lg"
                                   style="border: 2px solid #000; border-radius: 0; box-shadow: none;">
                        </div>
                    </div>

                    <div class="d-flex justify-content-center gap-3 mt-5">

                        <button type="button" class="btn btn-outline-secondary fw-bolder text-uppercase"
                                data-bs-dismiss="modal"
                                style="font-size: 1.2rem; padding: 12px 40px; border-radius: 0; border-width: 2px;">
                            Cancelar
                        </button>

                        <button type="button" class="btn btn-orange fw-bolder text-uppercase text-white"
                                style="font-size: 1.2rem; padding: 12px 40px; border-radius: 0; background-color: #ff9433; border: none;">
                            Salvar
                        </button>

                    </div>
                </form>

            </div>
        </div>
    </div>
</div>

<div th:fragment="modalEditar" class="modal fade" id="modalEditarProduto" tabindex="-1" aria-hidden="true">

    <div class="modal-dialog modal-dialog-centered modal-lg">

        <div class="modal-content shadow-lg border-0" style="border-radius: 4px;">

            <div class="modal-header border-0 pb-0">
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <div class="modal-body px-5 pb-5 pt-2 text-center">

                <h1 class="page-title text-uppercase mb-3" style="line-height: 1;">
                    Editar<br>Produto
                </h1>

                <hr class="mx-auto mb-5" style="width: 80%; border-top: 2px solid #000; opacity: 1;">

                <form class="text-start px-md-4">
                    <div class="row g-4">

                        <div class="col-md-7">
                            <label class="form-label fw-bold text-uppercase text-dark mb-1" style="font-size: 1.1rem;">Nome do Produto :</label>
                            <input type="text" class="form-control form-control-lg" value="Caixa de Ferramentas"
                                   style="border: 2px solid #000; border-radius: 0; box-shadow: none;">
                        </div>

                        <div class="col-md-5">
                            <label class="form-label fw-bold text-uppercase text-dark mb-1" style="font-size: 1.1rem;">Valor (R$):</label>
                            <input type="number" step="0.01" class="form-control form-control-lg" value="150.00"
                                   style="border: 2px solid #000; border-radius: 0; box-shadow: none;">
                        </div>
                    </div>

                    <div class="d-flex justify-content-center gap-3 mt-5">

                        <button type="button" class="btn btn-outline-secondary fw-bolder text-uppercase"
                                data-bs-dismiss="modal"
                                style="font-size: 1.2rem; padding: 12px 40px; border-radius: 0; border-width: 2px;">
                            Cancelar
                        </button>

                        <button type="button" class="btn btn-orange fw-bolder text-uppercase text-white"
                                style="font-size: 1.2rem; padding: 12px 40px; border-radius: 0; background-color: #ff9433; border: none;">
                            Salvar
                        </button>

                    </div>
                </form>

            </div>
        </div>
    </div>
</div>

</body>
</html>
